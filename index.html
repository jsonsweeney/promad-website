<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Promad — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --teal: #417d86;
      --teal-light: #5a9aa4;
      --teal-dark: #2e5960;
      --teal-muted: rgba(65, 125, 134, 0.12);
      --cream: #f7f3ee;
      --ink: #1a2224;
      --ink-muted: #5a6669;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--cream);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* Background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse 80% 60% at 10% 90%, rgba(65, 125, 134, 0.15) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 90% 10%, rgba(65, 125, 134, 0.1) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    /* Decorative circles */
    body::after {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      border: 1px solid rgba(65, 125, 134, 0.12);
      top: -200px;
      right: -200px;
      pointer-events: none;
      z-index: 0;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
      position: relative;
      z-index: 1;
    }

    .eyebrow {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards;
      animation-delay: 0.1s;
    }

    .logo {
      font-family: 'Fraunces', serif;
      font-size: clamp(64px, 12vw, 120px);
      font-weight: 300;
      line-height: 1;
      color: var(--ink);
      letter-spacing: -0.02em;
      margin-bottom: 8px;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards;
      animation-delay: 0.2s;
    }

    .logo em {
      font-style: italic;
      color: var(--teal);
    }

    .tagline {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(16px, 2.5vw, 22px);
      color: var(--ink-muted);
      margin-bottom: 56px;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards;
      animation-delay: 0.35s;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--teal);
      margin: 0 auto 56px;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards;
      animation-delay: 0.45s;
    }

    .description {
      font-size: 16px;
      font-weight: 300;
      color: var(--ink-muted);
      line-height: 1.75;
      max-width: 440px;
      text-align: center;
      margin-bottom: 64px;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards;
      animation-delay: 0.55s;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--teal-muted);
      border: 1px solid rgba(65, 125, 134, 0.25);
      border-radius: 100px;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 500;
      color: var(--teal-dark);
      opacity: 0;
      animation: fadeUp 0.9s ease forwards;
      animation-delay: 0.65s;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--teal);
      animation: pulse 2s ease-in-out infinite;
    }

    /* Decorative globe element */
    .globe-wrap {
      position: relative;
      width: 160px;
      height: 160px;
      margin: 64px auto 0;
      opacity: 0;
      animation: fadeUp 1s ease forwards;
      animation-delay: 0.75s;
    }

    .globe {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: 1.5px solid rgba(65, 125, 134, 0.3);
      position: relative;
      overflow: hidden;
    }

    .globe::before {
      content: '';
      position: absolute;
      inset: -20%;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 18px,
        rgba(65, 125, 134, 0.08) 18px,
        rgba(65, 125, 134, 0.08) 19px
      ),
      repeating-linear-gradient(
        90deg,
        transparent,
        transparent 18px,
        rgba(65, 125, 134, 0.08) 18px,
        rgba(65, 125, 134, 0.08) 19px
      );
      border-radius: 50%;
    }

    .globe-ring {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 200px;
      height: 200px;
      border-radius: 50%;
      border: 1px dashed rgba(65, 125, 134, 0.2);
    }

    .globe-ring:nth-child(2) {
      width: 240px;
      height: 240px;
      border-style: solid;
      border-color: rgba(65, 125, 134, 0.08);
    }

    .globe-pin {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--teal);
      top: 38%;
      left: 44%;
      box-shadow: 0 0 0 3px rgba(65, 125, 134, 0.2);
    }

    footer {
      position: relative;
      z-index: 1;
      padding: 24px;
      display: flex;
      justify-content: center;
      gap: 32px;
      border-top: 1px solid rgba(65, 125, 134, 0.12);
    }

    footer a {
      font-size: 12px;
      font-weight: 400;
      color: var(--ink-muted);
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: color 0.2s ease;
    }

    footer a:hover {
      color: var(--teal);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    @media (max-width: 480px) {
      .globe-wrap {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main>
    <!-- <p class="eyebrow">Something is coming</p> -->
    <h1 class="logo">Pro<em>mad</em></h1>
    <p class="tagline">Discover. Review. Explore.</p>
    <div class="divider"></div>
    <p class="description">
      A travel app for backpackers and explorers — discover new destinations, share reviews, plan trips, and track everywhere you've been.
    </p>
    <!-- <div class="badge">
      <span class="badge-dot"></span>
      Currently in development
    </div> -->
  </main>

  <footer>
    <a href="terms.html">Terms &amp; Conditions</a>
    <a href="privacy.html">Privacy Policy</a>
  </footer>
</body>
</html>
